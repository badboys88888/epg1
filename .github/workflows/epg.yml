name: EPG Rebuild

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          pip install requests opencc-python-reimplemented

      # 4️⃣ 生成 name_map
      - name: Generate name map
        run: |
          python auto_name_map.py

      # 5️⃣ 重建EPG
      - name: Run EPG rebuild
        run: |
          python epg_rebuild.py

      # 🆕 6️⃣ 生成 epg.json（关键）
      - name: Build epg.json
        run: |
          python build_epg_json.py

      # 7️⃣ 提交
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "EPG auto rebuild" || exit 0
          git push
